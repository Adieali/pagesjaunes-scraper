name: Refresh Pages Jaunes Data

on:
  schedule:
    - cron: "0 7 * * *"   # Tous les jours à 7h UTC
  workflow_dispatch:        # Déclenchement manuel possible

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          playwright install chromium --with-deps
      - name: Install Playwright Scrapy integration
        run: |
          pip install scrapy-playwright
          
      - name: Run scraper
        run: |
          pj-scraper scrape --what "plombier" --where "Paris" --pages 5 --output-dir data -v
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      - name: Commit & push updated data
        run: |
          git config user.email "eric56892@gmail.com"
          git config user.name "Adieali"
          git add data/
          if git diff --staged --quiet; then
            echo "Aucune modification."
          else
            git commit -m "chore: refresh scraped data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
